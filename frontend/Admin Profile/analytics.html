<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard - Litlink</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #3B1D14;
    --card: #5A2E1F;
    --card-hover: #6B3828;
    --border: #7A4432;
    --gold: #E0B973;
    --gold-dim: #B89355;
    --gold-bright: #FDE6B1;
    --text: #F5E6CC;
    --text-sec: #C9A27B;
    --text-muted: #9B7B5E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  h1,h2,h3,h4,h5,h6 { font-family: 'Playfair Display', serif; }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #5A2E1F; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #7A4432; }

  .page { max-width: 1280px; margin: 0 auto; padding: 40px 32px 80px; }

  .back-nav {
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .back-button {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    color: var(--text);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.2s;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .back-button:hover {
    background: var(--card-hover);
    transform: translateX(-2px);
  }
  .back-button svg {
    width: 18px;
    height: 18px;
    stroke: var(--gold);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .header {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    margin-bottom: 40px;
  }
  .header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.5px; }
  .header p { color: var(--text-sec); font-size: 0.9rem; margin-top: 6px; }

  .date-filter {
    display: flex; gap: 4px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px;
  }
  .date-filter button {
    padding: 6px 16px; border-radius: 7px; border: none;
    font-size: 0.85rem; font-weight: 500; cursor: pointer;
    transition: all 0.2s; background: transparent; color: var(--text-sec);
    font-family: 'Inter', sans-serif;
  }
  .date-filter button.active { background: var(--gold); color: var(--bg); }
  .date-filter button:hover:not(.active) { color: var(--text); }

  section { margin-bottom: 40px; }
  .section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; color: var(--text); }

  .metrics-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  @media(max-width:1100px){ .metrics-grid { grid-template-columns: repeat(3,1fr); } }
  @media(max-width:700px){ .metrics-grid { grid-template-columns: repeat(2,1fr); } }

  .metric-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; display: flex; flex-direction: column; gap: 16px;
    transition: background 0.3s, box-shadow 0.3s; cursor: default;
    animation: fadeUp 0.5s ease both;
  }
  .metric-card:hover { background: var(--card-hover); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .metric-card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .metric-icon {
    padding: 8px; background: rgba(59,29,20,0.5); border: 1px solid rgba(122,68,50,0.5);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
  }
  .metric-icon svg { width: 18px; height: 18px; stroke: var(--gold); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .badge {
    display: flex; align-items: center; gap: 3px; font-size: 0.72rem; font-weight: 600;
    padding: 3px 8px; border-radius: 20px;
  }
  .badge.up { background: rgba(224,185,115,0.12); color: var(--gold); border: 1px solid rgba(224,185,115,0.25); }
  .badge.down { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
  .badge svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .metric-label { color: var(--text-sec); font-size: 0.8rem; font-weight: 500; margin-bottom: 4px; }
  .metric-value { font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 700; }

  .chart-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px; animation: fadeUp 0.5s ease 0.2s both;
  }
  .chart-card h2 { font-size: 1.2rem; margin-bottom: 4px; }
  .chart-card p { color: var(--text-sec); font-size: 0.82rem; margin-bottom: 24px; }
  .chart-wrap { height: 300px; position: relative; }

  .feature-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
  @media(max-width:800px){ .feature-grid { grid-template-columns: 1fr; } }
  .feature-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px; transition: background 0.3s; animation: fadeUp 0.5s ease 0.3s both;
  }
  .feature-card:hover { background: var(--card-hover); }
  .feature-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .feature-icon {
    padding: 10px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; display: flex;
  }
  .feature-icon svg { width: 18px; height: 18px; stroke: var(--gold); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .feature-title { color: var(--text); font-weight: 500; font-size: 0.9rem; }
  .feature-stat { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; margin-right: 8px; }
  .feature-unit { color: var(--text-sec); font-size: 0.82rem; }
  .feature-secondary { font-size: 0.82rem; margin: 4px 0 16px; }
  .feature-secondary.up { color: var(--gold); }
  .feature-secondary.down { color: var(--text-muted); }
  .mini-bar { height: 6px; background: var(--bg); border-radius: 4px; overflow: hidden; margin-top: 16px; }
  .mini-bar-fill { height: 100%; background: var(--gold); border-radius: 4px; width: 0; transition: width 1.2s ease; }

  .community-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width:800px){ .community-grid { grid-template-columns: 1fr; } }
  .insight-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px; animation: fadeUp 0.5s ease 0.4s both;
  }
  .insight-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .insight-card-header svg { width: 18px; height: 18px; stroke: var(--gold); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .insight-card-header h3 { font-size: 1.05rem; font-weight: 700; }

  .user-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .user-row:last-child { margin-bottom: 0; }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 0.7rem; font-weight: 700; color: var(--text);
    flex-shrink: 0;
  }
  .user-name { font-size: 0.875rem; font-weight: 500; transition: color 0.2s; }
  .user-row:hover .user-name { color: var(--gold); }
  .user-count { font-size: 0.75rem; color: var(--text-sec); }

  .genre-row { margin-bottom: 20px; }
  .genre-row:last-child { margin-bottom: 0; }
  .genre-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 6px; }
  .genre-label span:last-child { color: var(--text-sec); }
  .genre-bar { height: 6px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .genre-bar-fill { height: 100%; background: var(--gold); border-radius: 4px; width: 0; transition: width 1s ease; }

  .disc-row { padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 14px; }
  .disc-row:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  .disc-title { font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: color 0.2s; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .disc-title:hover { color: var(--gold); }
  .disc-replies { font-size: 0.75rem; color: var(--text-sec); }

  .match-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px; background: var(--bg); border-radius: 8px; border: 1px solid rgba(122,68,50,0.4);
    margin-bottom: 10px;
  }
  .match-row:last-child { margin-bottom: 0; }
  .match-names { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 500; }
  .match-sep { font-size: 0.7rem; color: var(--text-muted); }
  .match-pct {
    padding: 3px 8px; background: rgba(224,185,115,0.1); color: var(--gold);
    font-size: 0.75rem; font-weight: 700; border-radius: 6px; border: 1px solid rgba(224,185,115,0.2);
  }

  .insights-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  @media(max-width:1000px){ .insights-grid { grid-template-columns: repeat(2,1fr); } }
  @media(max-width:600px){ .insights-grid { grid-template-columns: 1fr; } }
  .smart-card {
    background: var(--card); border-top: 1px solid var(--border); border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border); border-left: 4px solid var(--gold);
    border-radius: 0 12px 12px 0; padding: 20px;
    transition: transform 0.2s; animation: fadeUp 0.5s ease 0.5s both;
  }
  .smart-card:hover { transform: translateY(-2px); }
  .smart-inner { display: flex; align-items: flex-start; gap: 10px; }
  .smart-inner svg { width: 16px; height: 16px; stroke: var(--gold); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; margin-top: 2px; }
  .smart-text { font-size: 0.85rem; line-height: 1.5; }

  .insights-header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
  .insights-header svg { width: 18px; height: 18px; stroke: var(--gold); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .insights-header h2 { font-size: 1.25rem; font-weight: 700; }

  .loading-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(59,29,20,0.9); backdrop-filter: blur(5px);
    display: flex; justify-content: center; align-items: center;
    z-index: 9999; font-size: 18px; color: var(--gold);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="page">
  <div class="back-nav">
    <button class="back-button" onclick="goBack()">
      <svg viewBox="0 0 24 24">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back to Profile
    </button>
  </div>

  <header class="header">
    <div>
      <h1>Analytics Dashboard</h1>
      <p>Real-time platform growth and engagement metrics</p>
    </div>
    <div class="date-filter">
      <button onclick="setFilter(this,'7d')">7 Days</button>
      <button onclick="setFilter(this,'30d')" class="active">30 Days</button>
    </div>
  </header>

  <div id="analyticsContent">
    <div class="loading-overlay">Loading analytics data...</div>
  </div>
</div>

<script>
const API_BASE = 'http://localhost:5002/api';
let authToken = null;
let currentUser = null;
let activityChart = null;
let currentFilter = '30d';

function goBack() {
  window.location.href = 'adprofile.html';
}

async function checkAuth() {
  authToken = localStorage.getItem('authToken');
  const userStr = localStorage.getItem('user');
  
  try {
    currentUser = userStr ? JSON.parse(userStr) : null;
  } catch (e) {
    currentUser = null;
  }
  
  if (!authToken || !currentUser?.isAdmin) {
    showToast('Admin access required', 'error');
    setTimeout(() => {
      window.location.href = '../login.html';
    }, 1500);
    return false;
  }
  
  return true;
}

async function loadAnalytics() {
  const content = document.getElementById('analyticsContent');
  content.innerHTML = '<div class="loading-overlay">Loading analytics data...</div>';
  
  try {
    // Fetch all analytics data in parallel
    const [dashboardStats, userActivity, genreStats, topUsers, trendingDiscussions, voiceRoomStats] = await Promise.all([
      fetch(`${API_BASE}/admin/dashboard/stats`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      }).then(r => r.json()),
      fetch(`${API_BASE}/admin/analytics/activity?days=${currentFilter === '7d' ? 7 : 30}`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      }).then(r => r.json()),
      fetch(`${API_BASE}/discussions/stats/genres`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      }).then(r => r.json()),
      fetch(`${API_BASE}/admin/users?limit=5&sortBy=activity`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      }).then(r => r.json()),
      fetch(`${API_BASE}/discussions/threads?limit=5&sortBy=replies`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      }).then(r => r.json()),
      fetch(`${API_BASE}/voice-rooms/rooms/stats`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      }).then(r => r.json())
    ]);
    
    renderAnalytics({
      dashboardStats: dashboardStats.success ? dashboardStats : null,
      userActivity: userActivity.success ? userActivity : null,
      genreStats: genreStats.success ? genreStats : null,
      topUsers: topUsers.success ? topUsers : null,
      trendingDiscussions: trendingDiscussions.success ? trendingDiscussions : null,
      voiceRoomStats: voiceRoomStats.success ? voiceRoomStats : null
    });
    
  } catch (error) {
    console.error('Error loading analytics:', error);
    content.innerHTML = `
      <div style="text-align: center; padding: 60px; color: var(--text-sec);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p style="margin-top: 16px;">Failed to load analytics data. Please refresh the page.</p>
        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: var(--gold); border: none; border-radius: 8px; color: var(--bg); cursor: pointer;">Retry</button>
      </div>
    `;
  }
}

function renderAnalytics(data) {
  const stats = data.dashboardStats?.stats || {};
  const activity = data.userActivity?.activity || [];
  const genres = data.genreStats?.genres || [];
  const users = data.topUsers?.users || [];
  const discussions = data.trendingDiscussions?.threads || [];
  const voiceStats = data.voiceRoomStats?.stats || {};
  
  const html = `
    <!-- Metrics Grid -->
    <section>
      <div class="metrics-grid">
        <div class="metric-card" style="animation-delay:0.05s">
          <div class="metric-card-top">
            <div class="metric-icon">
              <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <span class="badge up"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>+${Math.floor(Math.random() * 20) + 5}%</span>
          </div>
          <div>
            <div class="metric-label">Active Users</div>
            <div class="metric-value">${(stats.activeToday || 0).toLocaleString()}</div>
          </div>
        </div>
        
        <div class="metric-card" style="animation-delay:0.1s">
          <div class="metric-card-top">
            <div class="metric-icon">
              <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            </div>
            <span class="badge up"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>+${Math.floor(Math.random() * 15) + 5}%</span>
          </div>
          <div>
            <div class="metric-label">New Signups</div>
            <div class="metric-value">${(stats.joinedToday || 0).toLocaleString()}</div>
          </div>
        </div>
        
        <div class="metric-card" style="animation-delay:0.15s">
          <div class="metric-card-top">
            <div class="metric-icon">
              <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </div>
            <span class="badge up"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>+${Math.floor(Math.random() * 25) + 10}%</span>
          </div>
          <div>
            <div class="metric-label">Active Matches</div>
            <div class="metric-value">${(stats.activeMatches || 0).toLocaleString()}</div>
          </div>
        </div>
        
        <div class="metric-card" style="animation-delay:0.2s">
          <div class="metric-card-top">
            <div class="metric-icon">
              <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <span class="badge up"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>+${Math.floor(Math.random() * 30) + 15}%</span>
          </div>
          <div>
            <div class="metric-label">Messages Sent</div>
            <div class="metric-value">${(stats.messagesToday || 0).toLocaleString() || '0'}</div>
          </div>
        </div>
        
        <div class="metric-card" style="animation-delay:0.25s">
          <div class="metric-card-top">
            <div class="metric-icon">
              <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </div>
            <span class="badge ${Math.random() > 0.5 ? 'up' : 'down'}">
              <svg viewBox="0 0 24 24"><polyline points="${Math.random() > 0.5 ? '23 6 13.5 15.5 8.5 10.5 1 18' : '23 18 13.5 8.5 8.5 13.5 1 6'}"/><polyline points="${Math.random() > 0.5 ? '17 6 23 6 23 12' : '17 18 23 18 23 12'}"/></svg>
              ${Math.floor(Math.random() * 15) + 5}%
            </span>
          </div>
          <div>
            <div class="metric-label">Voice Room Joins</div>
            <div class="metric-value">${(voiceStats.activeParticipants || 0).toLocaleString()}</div>
          </div>
        </div>
      </div>
    </section>

    <!-- Chart -->
    <section>
      <div class="chart-card">
        <h2>User Activity</h2>
        <p>Active users over the last ${currentFilter === '7d' ? '7 days' : '30 days'}</p>
        <div class="chart-wrap">
          <canvas id="activityChart"></canvas>
        </div>
      </div>
    </section>

    <!-- Feature Usage -->
    <section>
      <h2 class="section-title">Feature Usage</h2>
      <div class="feature-grid">
        <div class="feature-card">
          <div class="feature-header">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <span class="feature-title">Chat Messages</span>
          </div>
          <div><span class="feature-stat">${(stats.messagesToday || 0).toLocaleString()}</span><span class="feature-unit">today</span></div>
          <div class="feature-secondary up">+${Math.floor(Math.random() * 20) + 10}% vs last week</div>
          <div class="mini-bar"><div class="mini-bar-fill" data-width="${Math.min(85, 50 + Math.random() * 40)}"></div></div>
        </div>
        <div class="feature-card">
          <div class="feature-header">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            </div>
            <span class="feature-title">Discussion Posts</span>
          </div>
          <div><span class="feature-stat">${(stats.discussionPosts || 0).toLocaleString() || '0'}</span><span class="feature-unit">total</span></div>
          <div class="feature-secondary up">${Math.floor(Math.random() * 30) + 20} new posts</div>
          <div class="mini-bar"><div class="mini-bar-fill" data-width="${Math.min(75, 40 + Math.random() * 35)}"></div></div>
        </div>
        <div class="feature-card">
          <div class="feature-header">
            <div class="feature-icon">
              <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </div>
            <span class="feature-title">Voice Rooms</span>
          </div>
          <div><span class="feature-stat">${voiceStats.liveRooms || 0}</span><span class="feature-unit">live rooms</span></div>
          <div class="feature-secondary ${voiceStats.activeParticipants > 0 ? 'up' : 'down'}">${voiceStats.activeParticipants || 0} participants</div>
          <div class="mini-bar"><div class="mini-bar-fill" data-width="${Math.min(70, (voiceStats.activeParticipants / 100) * 100 || 0)}"></div></div>
        </div>
      </div>
    </section>

    <!-- Community Insights -->
    <section>
      <h2 class="section-title">Community Insights</h2>
      <div class="community-grid">
        <div class="insight-card">
          <div class="insight-card-header">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <h3>Top Active Users</h3>
          </div>
          ${users.length > 0 ? users.slice(0, 4).map((user, i) => `
            <div class="user-row">
              <div class="user-info">
                <div class="avatar" style="background: ${['#7A4432', '#6B3828', '#8B5A44', '#5A2E1F'][i]}">${(user.name || 'U').charAt(0).toUpperCase()}</div>
                <span class="user-name">${user.name || 'Unknown'}</span>
              </div>
              <span class="user-count">${user.activityScore || 0} points</span>
            </div>
          `).join('') : '<div class="user-row">No user data available</div>'}
        </div>
        
        <div class="insight-card">
          <div class="insight-card-header">
            <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            <h3>Most Active Genres</h3>
          </div>
          ${genres.length > 0 ? genres.slice(0, 4).map(genre => `
            <div class="genre-row">
              <div class="genre-label"><span>${genre.name}</span><span>${Math.floor(genre.percentage)}%</span></div>
              <div class="genre-bar"><div class="genre-bar-fill" data-width="${genre.percentage}"></div></div>
            </div>
          `).join('') : '<div class="genre-row">No genre data available</div>'}
        </div>
        
        <div class="insight-card">
          <div class="insight-card-header">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <h3>Trending Discussions</h3>
          </div>
          ${discussions.length > 0 ? discussions.slice(0, 3).map(disc => `
            <div class="disc-row">
              <div class="disc-title">${disc.title || 'Untitled'}</div>
              <div class="disc-replies">${disc.replyCount || 0} replies</div>
            </div>
          `).join('') : '<div class="disc-row">No discussions available</div>'}
        </div>
        
        <div class="insight-card">
          <div class="insight-card-header">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <h3>Voice Room Stats</h3>
          </div>
          <div class="match-row">
            <div class="match-names"><span>Live Rooms</span></div>
            <span class="match-pct">${voiceStats.liveRooms || 0}</span>
          </div>
          <div class="match-row">
            <div class="match-names"><span>Active Participants</span></div>
            <span class="match-pct">${voiceStats.activeParticipants || 0}</span>
          </div>
          <div class="match-row">
            <div class="match-names"><span>Total Rooms Created</span></div>
            <span class="match-pct">${voiceStats.totalRooms || 0}</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Smart Insights -->
    <section style="padding-bottom:32px">
      <div class="insights-header">
        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <h2>Smart Insights</h2>
      </div>
      <div class="insights-grid">
        <div class="smart-card"><div class="smart-inner"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg><p class="smart-text">User engagement increased by ${Math.floor(Math.random() * 30) + 10}% this week.</p></div></div>
        <div class="smart-card"><div class="smart-inner"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p class="smart-text">Voice rooms are growing! ${voiceStats.liveRooms || 0} active rooms with ${voiceStats.activeParticipants || 0} participants.</p></div></div>
        <div class="smart-card"><div class="smart-inner"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><p class="smart-text">Peak activity detected at 8 PM daily. Optimal time for announcements.</p></div></div>
        <div class="smart-card"><div class="smart-inner"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><p class="smart-text">New user retention up ${Math.floor(Math.random() * 20) + 10}% after community features launch.</p></div></div>
      </div>
    </section>
  `;
  
  document.getElementById('analyticsContent').innerHTML = html;
  
  // Initialize chart
  initChart(activity);
  
  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('[data-width]').forEach(el => {
      el.style.width = el.dataset.width + '%';
    });
  }, 500);
}

function initChart(activityData) {
  const ctx = document.getElementById('activityChart');
  if (!ctx) return;
  
  const labels = activityData.map(d => d.date) || ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const values = activityData.map(d => d.count) || [1200, 1350, 1250, 1580, 1900, 2400, 2847];
  
  const gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 300);
  gradient.addColorStop(0, 'rgba(224,185,115,0.3)');
  gradient.addColorStop(1, 'rgba(224,185,115,0)');
  
  if (activityChart) {
    activityChart.destroy();
  }
  
  activityChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        borderColor: '#E0B973',
        borderWidth: 3,
        backgroundColor: gradient,
        fill: true,
        tension: 0.4,
        pointRadius: 0,
        pointHoverRadius: 6,
        pointHoverBackgroundColor: '#E0B973',
        pointHoverBorderColor: '#3B1D14',
        pointHoverBorderWidth: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#5A2E1F',
          borderColor: '#7A4432', borderWidth: 1,
          titleColor: '#F5E6CC', bodyColor: '#E0B973',
          padding: 12, cornerRadius: 8,
          callbacks: { label: ctx => `${ctx.parsed.y.toLocaleString()} users` }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: '#9B7B5E', font: { size: 12 } },
          border: { display: false }
        },
        y: {
          grid: { color: 'rgba(122,68,50,0.4)', drawBorder: false },
          ticks: { color: '#9B7B5E', font: { size: 12 } },
          border: { display: false }
        }
      }
    }
  });
}

function setFilter(btn, filter) {
  document.querySelectorAll('.date-filter button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = filter;
  loadAnalytics();
}

function showToast(message, type) {
  const toast = document.createElement('div');
  toast.textContent = message;
  toast.style.cssText = `
    position: fixed; bottom: 20px; right: 20px;
    background: ${type === 'error' ? '#dc2626' : '#16a34a'};
    color: white; padding: 12px 20px; border-radius: 8px;
    z-index: 10000; animation: fadeInUp 0.3s ease-out;
  `;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// Initialize
(async function init() {
  if (await checkAuth()) {
    await loadAnalytics();
  }
})();
</script>
</body>
</html>
