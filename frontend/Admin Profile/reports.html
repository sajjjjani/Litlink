<!DOCTYPE html>
<html lang="en">
<head>

<title>User Reports — Moderation | Litlink</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #3B1D14;
    --card: #5A2E1F;
    --card2: #4A2418;
    --border: rgba(245,230,204,0.1);
    --border2: rgba(245,230,204,0.2);
    --cream: #F5E6CC;
    --gold: #C4A882;
    --danger: #A33030;
    --danger-dark: #8B2020;
    --warning: #D4A017;
    --success: #2D6A4F;
    --info: #4A90D9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #6B3D2A; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #7D4E3A; }

  .page { max-width: 1280px; margin: 0 auto; padding: 32px 24px 80px; }

  .back-nav {
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .back-button {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    color: var(--cream);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: all 0.2s;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .back-button:hover {
    background: var(--card2);
    transform: translateX(-2px);
  }
  .back-button svg {
    width: 18px;
    height: 18px;
    stroke: var(--gold);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  header { margin-bottom: 32px; }
  header h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.3px; }
  header p { color: var(--gold); font-size: 0.875rem; margin-top: 4px; }

  .summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 32px; }
  @media(max-width:900px){ .summary-grid { grid-template-columns: repeat(2,1fr); } }
  .summary-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; display: flex; align-items: center; gap: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .summary-icon { padding: 12px; border-radius: 10px; display: flex; }
  .summary-icon svg { width: 22px; height: 22px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .summary-icon.info { background: rgba(74,144,217,0.12); } .summary-icon.info svg { stroke: var(--info); }
  .summary-icon.danger { background: rgba(163,48,48,0.12); } .summary-icon.danger svg { stroke: var(--danger); }
  .summary-icon.success { background: rgba(45,106,79,0.12); } .summary-icon.success svg { stroke: #4caf82; }
  .summary-icon.warning { background: rgba(212,160,23,0.12); } .summary-icon.warning svg { stroke: var(--warning); }
  .summary-label { font-size: 0.8rem; font-weight: 500; color: var(--gold); }
  .summary-value { font-size: 1.6rem; font-weight: 700; margin-top: 2px; }

  .main-layout { display: flex; gap: 24px; align-items: flex-start; }
  .reports-col { flex: 1; min-width: 0; }
  .sidebar { width: 320px; flex-shrink: 0; position: sticky; top: 24px; }
  @media(max-width:1024px){ .main-layout { flex-direction: column; } .sidebar { width: 100%; position: static; } }

  .filters {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 20px; margin-bottom: 20px;
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  }
  .filter-label { display: flex; align-items: center; gap: 6px; color: var(--gold); font-weight: 500; font-size: 0.875rem; }
  .filter-label svg { width: 18px; height: 18px; stroke: var(--gold); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  select, input[type=date], input[type=text] {
    background: #3B1D14; border: 1px solid var(--border2); color: var(--cream);
    font-size: 0.85rem; border-radius: 8px; padding: 8px 12px; outline: none;
    font-family: 'Inter', sans-serif; transition: border-color 0.2s;
    color-scheme: dark;
  }
  select:focus, input:focus { border-color: var(--warning); }
  select option { background: #3B1D14; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--gold); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
  .search-wrap input { width: 100%; padding-left: 34px; }
  ::placeholder { color: rgba(196,168,130,0.5); }

  .report-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; margin-bottom: 14px; transition: border-color 0.2s, transform 0.2s;
    display: flex; flex-direction: column;
    animation: fadeIn 0.35s ease both;
  }
  .report-card:hover { border-color: var(--border2); transform: translateY(-1px); }

  .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .type-badge {
    display: inline-flex; align-items: center; gap: 5px; font-size: 0.7rem;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 4px 10px; border-radius: 6px;
  }
  .type-badge svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .type-badge.chat { background: rgba(74,144,217,0.12); color: var(--info); }
  .type-badge.post { background: rgba(212,160,23,0.12); color: var(--warning); }
  .type-badge.user { background: rgba(163,48,48,0.12); color: #e06060; }
  .report-time { display: flex; align-items: center; gap: 4px; font-size: 0.72rem; color: var(--gold); }
  .report-time svg { width: 11px; height: 11px; stroke: var(--gold); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .status-dot { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; font-weight: 500; color: var(--gold); text-transform: capitalize; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .dot.pending { background: var(--warning); box-shadow: 0 0 0 0 rgba(212,160,23,0.5); animation: pulse 1.5s infinite; }
  .dot.resolved { background: #4caf82; }
  .dot.ignored { background: rgba(196,168,130,0.4); }

  .report-content {
    background: rgba(59,29,20,0.5); border: 1px solid rgba(245,230,204,0.05);
    border-radius: 8px; padding: 12px; margin-bottom: 12px;
  }
  .report-content p { font-size: 0.85rem; font-style: italic; color: var(--cream); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .report-content p::before { content: '"'; } .report-content p::after { content: '"'; }

  .report-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 5px; font-size: 0.72rem; font-weight: 500; }
  .tag.reason { background: #3B1D14; color: var(--gold); border: 1px solid var(--border); }
  .tag.history { background: rgba(163,48,48,0.1); color: #e06060; border: 1px solid rgba(163,48,48,0.2); }

  .report-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--gold); margin-bottom: 16px; }
  .report-meta .reporter { color: var(--info); font-weight: 500; }
  .report-meta .target { color: #e06060; font-weight: 500; }

  .report-actions { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding-top: 14px; border-top: 1px solid var(--border); }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; padding: 8px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; font-family: 'Inter', sans-serif; }
  .btn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .btn-details { background: transparent; border: 1px solid rgba(74,144,217,0.3); color: var(--info); }
  .btn-details:hover { background: rgba(74,144,217,0.1); }
  .btn-ignore { background: transparent; border: 1px solid var(--border2); color: var(--gold); }
  .btn-ignore:hover:not(:disabled) { background: rgba(245,230,204,0.05); color: var(--cream); }
  .btn-action { background: var(--danger); color: #fff; }
  .btn-action:hover:not(:disabled) { background: var(--danger-dark); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .empty-state {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 48px 24px; text-align: center; color: var(--gold); font-size: 1rem;
  }

  .sidebar-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; max-height: 800px; overflow-y: auto;
  }
  .sidebar-title { display: flex; align-items: center; gap: 8px; font-size: 1rem; font-weight: 600; margin-bottom: 20px; }
  .sidebar-title svg { width: 18px; height: 18px; stroke: var(--gold); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .action-item { border-left: 2px solid var(--border); padding-left: 16px; padding-bottom: 4px; margin-bottom: 18px; position: relative; }
  .action-item:last-child { margin-bottom: 0; }
  .action-icon-wrap { position: absolute; left: -9px; top: 2px; background: var(--card); border-radius: 50%; padding: 1px; }
  .action-icon { display: flex; }
  .action-icon svg { width: 14px; height: 14px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .action-icon.ban svg { stroke: #e06060; }
  .action-icon.delete svg { stroke: #e06060; }
  .action-icon.warning svg { stroke: var(--warning); }
  .action-icon.suspend svg { stroke: var(--warning); }
  .action-icon.ignore svg { stroke: var(--gold); }
  .action-desc { font-size: 0.82rem; font-weight: 500; margin-bottom: 4px; }
  .action-target { font-size: 0.75rem; color: var(--gold); margin-bottom: 6px; }
  .action-target span { color: var(--cream); }
  .action-footer { display: flex; justify-content: space-between; font-size: 0.68rem; color: rgba(196,168,130,0.6); text-transform: uppercase; letter-spacing: 0.04em; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 18px; width: 100%; max-width: 520px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow: hidden;
    animation: modalIn 0.25s ease;
  }
  .modal-lg { max-width: 680px; max-height: 90vh; display: flex; flex-direction: column; }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    background: rgba(59,29,20,0.6); display: flex; justify-content: space-between; align-items: center;
  }
  .modal-header h2 { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .modal-header svg.hicon { width: 20px; height: 20px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .btn-close { width: 32px; height: 32px; border-radius: 50%; background: transparent; border: none; cursor: pointer; color: var(--gold); display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .btn-close:hover { background: rgba(245,230,204,0.1); color: var(--cream); }
  .btn-close svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .modal-body { padding: 24px; overflow-y: auto; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); background: rgba(59,29,20,0.4); display: flex; justify-content: flex-end; }

  .user-profile-snippet { display: flex; align-items: center; gap: 16px; padding: 16px; background: #3B1D14; border-radius: 12px; border: 1px solid rgba(245,230,204,0.05); margin-bottom: 20px; }
  .user-avatar { width: 56px; height: 56px; border-radius: 50%; background: rgba(163,48,48,0.2); border: 1px solid rgba(163,48,48,0.3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .user-avatar svg { width: 28px; height: 28px; stroke: #e06060; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .user-profile-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .user-profile-meta { display: flex; gap: 12px; font-size: 0.78rem; color: var(--gold); }
  .user-profile-meta .danger-text { color: #e06060; display: flex; align-items: center; gap: 3px; }
  .user-profile-meta svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .profile-action-btn { margin-left: auto; padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(74,144,217,0.3); color: var(--info); background: transparent; font-size: 0.8rem; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; }
  .section-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gold); margin-bottom: 10px; }
  .content-box { background: #3B1D14; border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 20px; font-size: 0.875rem; line-height: 1.6; white-space: pre-wrap; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .meta-item { background: rgba(59,29,20,0.5); border: 1px solid rgba(245,230,204,0.05); border-radius: 10px; padding: 14px; }
  .meta-item .key { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gold); margin-bottom: 4px; }
  .meta-item .val { font-size: 0.875rem; font-weight: 500; }
  .meta-item .val.info { color: var(--info); }
  .meta-item .val.cream { color: var(--cream); }
  .history-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; padding: 10px 12px; background: rgba(59,29,20,0.3); border: 1px solid rgba(163,48,48,0.1); border-radius: 8px; margin-bottom: 8px; }
  .history-item svg { width: 14px; height: 14px; stroke: #e06060; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
  .history-item .hist-time { margin-left: auto; color: var(--gold); }

  .action-options { display: flex; flex-direction: column; gap: 10px; }
  .action-option {
    display: flex; align-items: flex-start; gap: 14px; padding: 14px; border-radius: 12px;
    border: 1px solid; cursor: pointer; transition: all 0.2s; background: transparent; width: 100%; text-align: left;
    font-family: 'Inter', sans-serif;
  }
  .action-option:hover { opacity: 0.9; }
  .action-option.warning-opt { border-color: rgba(212,160,23,0.3); background: rgba(212,160,23,0.08); }
  .action-option.warning-opt:hover { border-color: var(--warning); background: rgba(212,160,23,0.15); }
  .action-option.delete-opt { border-color: rgba(163,48,48,0.3); background: rgba(163,48,48,0.08); }
  .action-option.delete-opt:hover { border-color: var(--danger); background: rgba(163,48,48,0.15); }
  .action-option.suspend-opt { border-color: rgba(234,100,30,0.3); background: rgba(234,100,30,0.08); }
  .action-option.suspend-opt:hover { border-color: #ea641e; background: rgba(234,100,30,0.15); }
  .action-option.ban-opt { border-color: rgba(139,32,32,0.4); background: rgba(139,32,32,0.15); }
  .action-option.ban-opt:hover { border-color: var(--danger-dark); background: rgba(139,32,32,0.25); }
  .action-opt-icon { padding: 8px; background: #3B1D14; border-radius: 8px; display: flex; flex-shrink: 0; }
  .action-opt-icon svg { width: 18px; height: 18px; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .action-opt-icon.warning-icon svg { stroke: var(--warning); }
  .action-opt-icon.delete-icon svg { stroke: var(--danger); }
  .action-opt-icon.suspend-icon svg { stroke: #ea641e; }
  .action-opt-icon.ban-icon svg { stroke: var(--danger-dark); }
  .action-opt-title { font-weight: 600; font-size: 0.9rem; color: var(--cream); margin-bottom: 3px; }
  .action-opt-desc { font-size: 0.78rem; color: var(--gold); }
  .confirm-view { text-align: center; padding: 16px 0; }
  .confirm-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(163,48,48,0.2); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; }
  .confirm-icon svg { width: 32px; height: 32px; stroke: var(--danger); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .confirm-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
  .confirm-text { font-size: 0.875rem; color: var(--gold); line-height: 1.6; margin-bottom: 28px; }
  .confirm-text strong { color: var(--cream); }
  .confirm-text .danger-name { color: #e06060; font-weight: 700; }
  .confirm-btns { display: flex; gap: 10px; }
  .btn-cancel { flex: 1; padding: 12px; border: 1px solid var(--border2); background: transparent; color: var(--cream); border-radius: 10px; font-size: 0.875rem; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; }
  .btn-cancel:hover { background: rgba(245,230,204,0.05); }
  .btn-confirm { flex: 1; padding: 12px; background: var(--danger); color: #fff; border: none; border-radius: 10px; font-size: 0.875rem; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; box-shadow: 0 4px 14px rgba(163,48,48,0.3); }
  .btn-confirm:hover { background: var(--danger-dark); }
  .back-btn { background: none; border: none; color: var(--gold); cursor: pointer; display: flex; align-items: center; gap: 4px; font-size: 0.8rem; padding: 0; margin-right: 8px; }
  .back-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 12px 20px;
    background: #3d1a0e; border: 1px solid var(--gold); border-radius: 10px;
    color: var(--cream); font-size: 0.85rem; z-index: 200; display: none;
    animation: toastIn 0.3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(12px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(212,160,23,0.5); } 50% { box-shadow: 0 0 0 5px rgba(212,160,23,0); } }

  .loading-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(59,29,20,0.9); backdrop-filter: blur(5px);
    display: flex; justify-content: center; align-items: center;
    z-index: 9999; font-size: 18px; color: var(--gold);
  }
</style>
</head>

<div class="page" id="mainPage" style="transition: margin-left 0.3s ease;">

  </div>

<script>
const API_BASE = 'http://localhost:5002/api/admin';
const API_ROOT = 'http://localhost:5002/api';
let authToken = null;
let currentUser = null;
let allReports = [];
let recentActions = [];

function goBack() {
  window.location.href = 'adprofile.html';
}

async function checkAuth() {
  // Check all possible storage keys for token and user
  authToken = sessionStorage.getItem('litlink_token') || 
              sessionStorage.getItem('authToken') || 
              localStorage.getItem('litlink_token') || 
              localStorage.getItem('authToken');
              
  const userStr = sessionStorage.getItem('litlink_user') || 
                  sessionStorage.getItem('user') || 
                  localStorage.getItem('litlink_user') || 
                  localStorage.getItem('user');
  
  try {
    currentUser = userStr ? JSON.parse(userStr) : null;
  } catch (e) {
    currentUser = null;
  }
  
  if (!authToken || !currentUser?.isAdmin) {
    window.location.href = '../Homepage/index.html';
    return false;
  }
  
  return true;
}

function initNavbar() {
    const navToggle = document.getElementById('navToggle');
    const navbar = document.getElementById('adminNavbar');
    const mainPage = document.getElementById('mainPage');
    
    if (navToggle && navbar) {
        navToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            navbar.classList.toggle('active');
            if (window.innerWidth > 1024) {
                if (navbar.classList.contains('active')) {
                    mainPage.style.marginLeft = '280px';
                } else {
                    mainPage.style.marginLeft = '0';
                }
            }
        });
        
        document.addEventListener('click', function(event) {
            if (window.innerWidth <= 1024) {
                if (!navbar.contains(event.target) && !navToggle.contains(event.target)) {
                    navbar.classList.remove('active');
                }
            }
        });
    }

    document.getElementById('logoutBtnSidebar')?.addEventListener('click', (e) => {
        e.preventDefault();
        window.SystemModal.confirm(
            'Logout',
            'Are you sure you want to logout?',
            () => {
                sessionStorage.clear();
                localStorage.clear();
                window.location.href = '../Homepage/index.html';
            }
        );
    });
}

async function loadReports() {
  const content = document.getElementById('reportsContent');
  content.innerHTML = '<div class="loading-overlay">Loading reports...</div>';
  
  try {
    // Fetch reports and recent actions
    const [reportsRes, actionsRes] = await Promise.all([
      fetch(`${API_BASE}/reports?limit=100`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      }),
      fetch(`${API_BASE}/reports?limit=10&status=resolved`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      })
    ]);
    
    const reportsData = await reportsRes.json();
    const actionsData = await actionsRes.json();
    
    if (reportsData.success) {
      allReports = reportsData.reports;
      recentActions = actionsData.reports || [];
      
      renderReportsPage();
    } else {
      throw new Error('Failed to load reports');
    }
    
  } catch (error) {
    console.error('Error loading reports:', error);
    content.innerHTML = `
      <div style="text-align: center; padding: 60px; color: var(--text-sec);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p style="margin-top: 16px;">Failed to load reports. Please refresh the page.</p>
        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: var(--gold); border: none; border-radius: 8px; color: var(--bg); cursor: pointer;">Retry</button>
      </div>
    `;
  }
}

function renderReportsPage() {
  const pendingCount = allReports.filter(r => r.status === 'pending').length;
  const resolvedCount = allReports.filter(r => r.status === 'resolved').length;
  const dismissedCount = allReports.filter(r => r.status === 'dismissed').length;
  
  // Find most reported user
  const userReportCounts = {};
  allReports.forEach(r => {
    const userId = r.reportedUser?._id;
    if (userId) {
      userReportCounts[userId] = (userReportCounts[userId] || 0) + 1;
    }
  });
  let mostReportedUser = 'None';
  let maxReports = 0;
  for (const [userId, count] of Object.entries(userReportCounts)) {
    if (count > maxReports) {
      maxReports = count;
      const user = allReports.find(r => r.reportedUser?._id === userId)?.reportedUser;
      mostReportedUser = user?.name || 'Unknown';
    }
  }
  
  const html = `
    <!-- Summary Cards -->
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-icon info">
          <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <div><div class="summary-label">Total Reports</div><div class="summary-value">${allReports.length}</div></div>
      </div>
      <div class="summary-card">
        <div class="summary-icon danger">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div><div class="summary-label">Pending Reports</div><div class="summary-value">${pendingCount}</div></div>
      </div>
      <div class="summary-card">
        <div class="summary-icon success">
          <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div><div class="summary-label">Resolved</div><div class="summary-value">${resolvedCount}</div></div>
      </div>
      <div class="summary-card">
        <div class="summary-icon warning">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        </div>
        <div><div class="summary-label">Most Reported</div><div class="summary-value">${mostReportedUser}</div></div>
      </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
      <div class="reports-col">
        <!-- Filters -->
        <div class="filters">
          <div class="filter-label">
            <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            <span>Filters:</span>
          </div>
          <select id="typeFilter" onchange="applyFilters()">
            <option value="all">All Types</option>
            <option value="user">User</option>
            <option value="post">Post</option>
            <option value="chat">Chat</option>
            <option value="profile">Profile</option>
            <option value="voice_room">Voice Room</option>
          </select>
          <select id="statusFilter" onchange="applyFilters()">
            <option value="pending" selected>Pending</option>
            <option value="all">All Statuses</option>
            <option value="resolved">Resolved</option>
            <option value="dismissed">Dismissed</option>
          </select>
          <input type="date" id="dateFilter" onchange="applyFilters()">
          <div class="search-wrap">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchFilter" placeholder="Search username or content..." oninput="applyFilters()">
          </div>
        </div>
        <div id="reportsList"></div>
      </div>
      <div class="sidebar">
        <div class="sidebar-card" id="recentActionsList"></div>
      </div>
    </div>
  `;
  
  document.getElementById('reportsContent').innerHTML = html;
  renderReportsList();
  renderRecentActions();
}

function renderReportsList() {
  const type = document.getElementById('typeFilter')?.value || 'all';
  const status = document.getElementById('statusFilter')?.value || 'pending';
  const date = document.getElementById('dateFilter')?.value || '';
  const search = document.getElementById('searchFilter')?.value.toLowerCase() || '';
  
  let filtered = allReports.filter(r => {
    if (type !== 'all' && r.reportedItemType !== type) return false;
    if (status !== 'all' && r.status !== status) return false;
    if (date && !r.createdAt?.startsWith(date)) return false;
    if (search) {
      const reporterName = r.reporter?.name?.toLowerCase() || '';
      const reportedName = r.reportedUser?.name?.toLowerCase() || '';
      const reason = (r.reason || '').toLowerCase();
      if (!reporterName.includes(search) && !reportedName.includes(search) && !reason.includes(search)) return false;
    }
    return true;
  });
  
  const list = document.getElementById('reportsList');
  if (!list) return;
  
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">No reports found matching your filters.</div>`;
    return;
  }
  
  list.innerHTML = filtered.map((r, i) => `
    <div class="report-card" style="animation-delay:${i*0.07}s" id="card-${r._id}">
      <div class="report-header">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span class="type-badge ${r.reportedItemType}">${getReportIcon(r.reportedItemType)}${r.reportedItemType}</span>
          <span class="report-time">${getClockIcon()}${formatDate(r.createdAt)}</span>
        </div>
        <div class="status-dot"><span class="dot ${r.status}"></span>${r.status}</div>
      </div>
      <div class="report-content"><p>${escapeHtml(r.reason || r.category || 'No description')}</p></div>
      <div class="report-tags">
        <span class="tag reason">Category: <strong>${r.category || 'other'}</strong></span>
        ${r.priority === 'high' || r.priority === 'urgent' ? `<span class="tag history">Priority: ${r.priority}</span>` : ''}
      </div>
      <div class="report-meta">
        <span>Reported by: <span class="reporter">${escapeHtml(r.reporter?.name || 'Anonymous')}</span></span>
        <span>Target: <span class="target">${escapeHtml(r.reportedUser?.name || 'Unknown')}</span></span>
      </div>
      <div class="report-actions">
        <button class="btn btn-details" onclick="openDetails('${r._id}')">${getEyeIcon()}Details</button>
        <button class="btn btn-ignore" onclick="ignoreReport('${r._id}')" ${r.status !== 'pending' ? 'disabled' : ''}>${getXIcon()}Ignore</button>
        <button class="btn btn-action" onclick="openAction('${r._id}')" ${r.status !== 'pending' ? 'disabled' : ''}>${getAlertIcon()}Action</button>
      </div>
    </div>
  `).join('');
}

function renderRecentActions() {
  const el = document.getElementById('recentActionsList');
  if (!el) return;
  
  const actions = recentActions.slice(0, 5);
  el.innerHTML = `
    <div class="sidebar-title">${getShieldIcon()}Recent Actions</div>
    ${actions.length === 0 ? '<div style="color: var(--gold); text-align: center;">No recent actions</div>' : 
      actions.map(a => `
        <div class="action-item">
          <div class="action-icon-wrap"><div class="action-icon ${a.status === 'resolved' ? 'delete' : 'ignore'}">${a.status === 'resolved' ? getDeleteIcon() : getIgnoreIcon()}</div></div>
          <div class="action-desc">${a.status === 'resolved' ? 'Resolved report' : a.status === 'dismissed' ? 'Dismissed report' : 'Reviewed report'}</div>
          <div class="action-target">Target: <span>${escapeHtml(a.reportedUser?.name || 'Unknown')}</span></div>
          <div class="action-footer"><span>By ${escapeHtml(a.resolvedBy?.name || 'Admin')}</span><span>${formatDate(a.resolvedAt || a.createdAt)}</span></div>
        </div>
      `).join('')
    }
  `;
}

function applyFilters() {
  renderReportsList();
}

function formatDate(dateStr) {
  if (!dateStr) return 'Unknown';
  return new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }).format(new Date(dateStr));
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// Icons
function getReportIcon(type) {
  const icons = {
    user: `<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
    post: `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
    chat: `<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
    profile: `<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
    voice_room: `<svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`,
  };
  return icons[type] || icons.user;
}

function getClockIcon() {
  return `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
}

function getEyeIcon() {
  return `<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}

function getXIcon() {
  return `<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
}

function getAlertIcon() {
  return `<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
}

function getShieldIcon() {
  return `<svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`;
}

function getDeleteIcon() {
  return `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;
}

function getIgnoreIcon() {
  return `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;
}

// Report actions
async function openDetails(reportId) {
  try {
    const response = await fetch(`${API_BASE}/reports/${reportId}`, {
      headers: { 'Authorization': `Bearer ${authToken}` }
    });
    const data = await response.json();
    if (data.success) showReportModal(data.report);
  } catch (error) {
    console.error('Error fetching report:', error);
    showToast('Could not load report details', 'warning');
  }
}

function showReportModal(report) {
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2><svg class="hicon" viewBox="0 0 24 24" style="stroke:#4A90D9"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Report Details</h2>
        <button class="btn-close" onclick="closeModal(this)"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="modal-body">
        <div class="user-profile-snippet">
          <div class="user-avatar">${getReportIcon('user')}</div>
          <div>
            <div class="user-profile-name">${escapeHtml(report.reportedUser?.name || 'Unknown')}</div>
            <div class="user-profile-meta">
              <span>${getClockIcon()}Reported: ${formatDate(report.createdAt)}</span>
              <span class="danger-text">${getAlertIcon()}${report.priority || 'medium'} priority</span>
            </div>
          </div>
        </div>
        <div class="section-label">Reported Content (${report.reportedItemType})</div>
        <div class="content-box">${escapeHtml(report.reason || report.category || 'No content')}</div>
        <div class="meta-grid">
          <div class="meta-item"><div class="key">Reported By</div><div class="val info">${escapeHtml(report.reporter?.name || 'Anonymous')}</div></div>
          <div class="meta-item"><div class="key">Category</div><div class="val cream">${report.category || 'other'}</div></div>
          <div class="meta-item"><div class="key">Status</div><div class="val cream">${report.status}</div></div>
          <div class="meta-item"><div class="key">Description</div><div class="val cream">${escapeHtml(report.description || 'No description')}</div></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-details" style="padding:10px 20px;font-size:0.85rem" onclick="closeModal(this)">Close Details</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.classList.add('open');
  
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
}

async function ignoreReport(reportId) {
  const reason = prompt('Enter reason for ignoring this report:', 'Report dismissed as invalid');
  if (!reason) return;
  
  try {
    const response = await fetch(`${API_BASE}/reports/${reportId}/dismiss`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${authToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ reason })
    });
    
    const data = await response.json();
    if (data.success) {
      showToast(`Report dismissed`, 'success');
      await loadReports();
    } else {
      showToast(data.message || 'Failed to dismiss report', 'error');
    }
  } catch (error) {
    console.error('Error dismissing report:', error);
    showToast('Failed to dismiss report', 'error');
  }
}

async function openAction(reportId) {
  const report = allReports.find(r => r._id === reportId);
  if (!report) return;
  
  const action = prompt(
    `Take action for report against ${report.reportedUser?.name || 'Unknown'}:\n\n` +
    `Options:\n` +
    `1 - Send Warning\n` +
    `2 - Delete Content\n` +
    `3 - Suspend User (7 days)\n` +
    `4 - Ban User\n\n` +
    `Enter number (1-4):`
  );
  
  if (!action) return;
  
  let actionType = '';
  let duration = '';
  let reason = '';
  
  switch(action) {
    case '1':
      actionType = 'warn';
      reason = prompt('Enter warning reason:', 'Violation of community guidelines');
      if (!reason) return;
      await warnUser(report.reportedUser?._id, reason);
      break;
    case '2':
      actionType = 'delete';
      reason = prompt('Enter reason for deletion:', 'Inappropriate content');
      if (!reason) return;
      await deleteContent(reportId, reason);
      break;
    case '3':
      actionType = 'suspend';
      duration = prompt('Enter suspension duration in days (default: 7):', '7');
      if (!duration) return;
      reason = prompt('Enter suspension reason:', 'Violation of community guidelines');
      if (!reason) return;
      await suspendUser(report.reportedUser?._id, reason, parseInt(duration));
      break;
    case '4':
      actionType = 'ban';
      reason = prompt('Enter ban reason:', 'Violation of terms of service');
      if (!reason) return;
      await banUser(report.reportedUser?._id, reason);
      break;
    default:
      showToast('Invalid option', 'warning');
      return;
  }
  
  // Resolve the report after action
  await resolveReport(reportId);
}

async function warnUser(userId, reason) {
  if (!userId) return;
  try {
    const response = await fetch(`${API_BASE}/users/${userId}/warn`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${authToken}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ reason })
    });
    const data = await response.json();
    if (data.success) {
      showToast(`Warning sent to user`, 'success');
    } else {
      showToast(data.message || 'Failed to warn user', 'error');
    }
  } catch (error) {
    console.error('Error warning user:', error);
    showToast('Failed to warn user', 'error');
  }
}

function closeModal(element) {
  const modal = element.closest('.modal-overlay');
  if (modal) modal.remove();
}

function showToast(message, type) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = message;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 3000);
}
