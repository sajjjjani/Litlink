<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Litlink - Find Readers</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg, #1a0f0a 0%, #2c1810 100%);color:#f5e6d3;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;min-height:100vh;padding:20px}
input,button{font-family:inherit}

/* Navigation */
.navbar{background:rgba(29,21,15,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(245,230,211,0.1);padding:12px 20px;margin:-20px -20px 20px -20px;position:sticky;top:0;z-index:100}
.nav-container{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.nav-brand{display:flex;align-items:center;gap:10px;font-size:1.5rem;font-weight:bold}
.nav-brand i{color:#e0b973}
.nav-links{display:flex;gap:24px}
.nav-links a{color:#d4b5a0;text-decoration:none;display:flex;align-items:center;gap:8px;transition:color 0.3s}
.nav-links a:hover,.nav-links a.active{color:#f5e6d3}
.back-btn{background:rgba(245,230,211,0.1);border:1px solid rgba(245,230,211,0.2);padding:8px 16px;border-radius:8px;color:#f5e6d3;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all 0.3s}
.back-btn:hover{background:rgba(245,230,211,0.2)}

/* Search Section */
.search-section{background:#3d2617;border-radius:16px;padding:20px;margin-bottom:24px;border:1px solid rgba(245,230,211,0.1)}
.search-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{flex:1;padding:12px 18px;border-radius:30px;border:1px solid #5c3a28;background:#2c1810;color:#f5e6d3;font-size:14px;outline:none}
.search-bar input:focus{border-color:#e0b973}
.filter-group{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:8px 16px;border-radius:20px;border:1px solid #5c3a28;background:transparent;color:#d4b5a0;cursor:pointer;transition:all 0.3s;font-size:13px}
.filter-btn.active,.filter-btn:hover{background:#5c3a28;color:#f5e6d3}
.genre-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:1px solid rgba(245,230,211,0.1)}

/* Stats Cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#3d2617;border-radius:16px;padding:20px;text-align:center;border:1px solid rgba(245,230,211,0.1)}
.stat-number{font-size:2rem;font-weight:bold;color:#e0b973}
.stat-label{color:#d4b5a0;margin-top:8px;font-size:0.9rem}

/* Section Headers */
.section-header{display:flex;justify-content:space-between;align-items:center;margin:24px 0 16px}
.section-header h2{font-size:1.5rem;color:#f5e6d3}
.section-header i{color:#e0b973}
.result-count{color:#d4b5a0;font-size:0.9rem}

/* Cards Grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:24px}
.card{background:#3d2617;border-radius:16px;padding:20px;text-align:center;border:1px solid rgba(245,230,211,0.1);transition:transform 0.3s, box-shadow 0.3s;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.3);border-color:rgba(245,230,211,0.2)}
.avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #e0b973;margin:0 auto 12px;display:block}
.avatar-placeholder{width:80px;height:80px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:bold;background:linear-gradient(135deg,#5c3a28,#3d2417);border:3px solid #e0b973}
.online-dot{width:12px;height:12px;background:#4caf50;border-radius:50%;border:2px solid #3d2617;position:absolute;bottom:2px;right:2px}
.avatar-wrap{position:relative;display:inline-block}
.card h3{font-size:1.2rem;margin-bottom:8px;color:#f5e6d3}
.tags{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tag{background:rgba(245,230,211,0.1);padding:4px 12px;border-radius:20px;font-size:0.75rem;color:#d4b5a0}
.match-percentage{background:linear-gradient(135deg,#e0b973,#c9a55c);color:#2c1810;padding:6px 12px;border-radius:20px;font-size:0.85rem;font-weight:bold;margin-bottom:12px;display:inline-block}
.card-btns{display:flex;gap:12px;margin-top:12px}
.btn-primary,.btn-secondary{flex:1;padding:10px;border-radius:8px;font-size:0.9rem;cursor:pointer;transition:all 0.3s;border:none;font-weight:500}
.btn-primary{background:#e0b973;color:#2c1810}
.btn-primary:hover{background:#f0c98a;transform:translateY(-2px)}
.btn-secondary{background:transparent;border:1px solid #e0b973;color:#e0b973}
.btn-secondary:hover{background:rgba(224,185,115,0.1)}

/* Loading & Empty States */
.loading{text-align:center;padding:40px;color:#d4b5a0}
.loading i{font-size:2rem;margin-bottom:12px;display:block}
.empty-state{text-align:center;padding:40px;background:#3d2617;border-radius:16px;margin:20px 0}
.empty-state i{font-size:3rem;margin-bottom:16px;color:#e0b973}
.empty-state p{margin-bottom:16px;color:#d4b5a0}

/* Modal */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center}
.modal-content{background:#3d2617;border-radius:20px;padding:24px;max-width:400px;width:90%;border:1px solid rgba(245,230,211,0.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h3{color:#f5e6d3}
.close-modal{background:none;border:none;color:#d4b5a0;font-size:24px;cursor:pointer;transition:color 0.3s}
.close-modal:hover{color:#f5e6d3}
.modal textarea{width:100%;padding:12px;border-radius:8px;background:#2c1810;border:1px solid #5c3a28;color:#f5e6d3;font-family:inherit;resize:vertical;margin:16px 0}
.modal textarea:focus{outline:none;border-color:#e0b973}
.modal-buttons{display:flex;gap:12px;margin-top:20px}

/* Responsive */
@media (max-width: 768px) {
  body{padding:12px}
  .nav-links{display:none}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .cards-grid{grid-template-columns:1fr}
  .filter-group{width:100%}
  .filter-btn{flex:1;text-align:center}
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="nav-brand">
      <i class="fas fa-book-open"></i>
      <span>Litlink</span>
    </div>
    <div class="nav-links">
      <a href="../Dashboard/dashboard.html"><i class="fas fa-home"></i> Home</a>
      <a href="../Chat/chat.html"><i class="fas fa-comments"></i> Chat</a>
      <a href="../Discussion Board/discussion.html"><i class="fas fa-users"></i> Discussions</a>
      <a href="../Profile/profile.html"><i class="fas fa-user"></i> Profile</a>
    </div>
    <a href="../Dashboard/dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
</nav>

<div class="container" style="max-width:1200px;margin:0 auto">
  <!-- Search Section -->
  <div class="search-section">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search by name, username, or favorite books...">
      <div class="filter-group">
        <button class="filter-btn active" data-filter="all">All Readers</button>
        <button class="filter-btn" data-filter="match">Top Matches</button>
        <button class="filter-btn" data-filter="online">Online Now</button>
        <button class="filter-btn" data-filter="recent">Recently Active</button>
      </div>
    </div>
    <div class="genre-pills" id="genrePills">
      <button class="filter-btn active" data-genre="all">All Genres</button>
      <button class="filter-btn" data-genre="Fantasy">Fantasy</button>
      <button class="filter-btn" data-genre="Mystery">Mystery</button>
      <button class="filter-btn" data-genre="Romance">Romance</button>
      <button class="filter-btn" data-genre="Sci-Fi">Sci-Fi</button>
      <button class="filter-btn" data-genre="Thriller">Thriller</button>
      <button class="filter-btn" data-genre="Horror">Horror</button>
      <button class="filter-btn" data-genre="Classics">Classics</button>
      <button class="filter-btn" data-genre="Young Adult">Young Adult</button>
    </div>
  </div>

  <!-- Stats Cards -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-number" id="totalReaders">0</div>
      <div class="stat-label">Total Readers</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="onlineNow">0</div>
      <div class="stat-label">Online Now</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="topMatch">0%</div>
      <div class="stat-label">Your Top Match</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="matchesCount">0</div>
      <div class="stat-label">Potential Matches</div>
    </div>
  </div>

  <!-- Readers Grid -->
  <div class="section-header">
    <h2><i class="fas fa-users"></i> Find Your Reading Soulmates</h2>
    <span class="result-count" id="resultCount"></span>
  </div>
  <div id="readersGrid" class="cards-grid">
    <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading readers...</div>
  </div>
</div>

<!-- Message Modal -->
<div id="messageModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Send Message</h3>
      <button class="close-modal" onclick="closeModal()">&times;</button>
    </div>
    <textarea id="messageText" rows="4" placeholder="Type your message here..."></textarea>
    <div class="modal-buttons">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="sendMessage()">Send Message</button>
    </div>
  </div>
</div>

<script>
// Global variables
let allReaders = [];
let currentUser = null;
let currentRecipientId = null;
let currentRecipientName = '';
let currentFilter = 'all';
let currentGenre = 'all';
let searchTerm = '';

// Initialize page
document.addEventListener('DOMContentLoaded', async () => {
  console.log('📚 Loading explore readers page...');
  
  // Check authentication
  const token = localStorage.getItem('litlink_token');
  const userStr = localStorage.getItem('litlink_user');
  
  if (!token || !userStr) {
    console.log('❌ Not authenticated, redirecting to login...');
    window.location.href = '../Homepage/index.html';
    return;
  }
  
  try {
    currentUser = JSON.parse(userStr);
    console.log('✅ Authenticated as:', currentUser.name);
    
    // Load readers
    await loadReaders();
    
    // Setup event listeners
    setupEventListeners();
  } catch (error) {
    console.error('Error initializing page:', error);
    document.getElementById('readersGrid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i class="fas fa-exclamation-triangle"></i>
        <p>Error loading page. Please refresh and try again.</p>
        <button onclick="window.location.reload()" class="btn-primary">Refresh</button>
      </div>
    `;
  }
});

// Load readers from API
async function loadReaders() {
  try {
    const token = localStorage.getItem('litlink_token');
    
    // First, get matches for the current user
    const matchesResponse = await fetch('http://localhost:5002/api/matches/matches?limit=50', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    let matchesMap = new Map();
    if (matchesResponse.ok) {
      const matchesData = await matchesResponse.json();
      if (matchesData.success && matchesData.matches) {
        matchesData.matches.forEach(match => {
          matchesMap.set(match.userId, {
            percentage: match.matchPercentage,
            score: match.score,
            commonInterests: match.details
          });
        });
      }
    }
    
    // Get all users from the users endpoint
    const usersResponse = await fetch('http://localhost:5002/api/users', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    if (!usersResponse.ok) {
      throw new Error(`Failed to load users: ${usersResponse.status}`);
    }
    
    const usersData = await usersResponse.json();
    
    // Filter and process users
    allReaders = (usersData.users || []).filter(user => {
      // Exclude current user, system admin, and banned users
      return user._id !== currentUser._id && 
             user.name !== 'System Admin' &&
             user.name !== 'Admin' &&
             !user.isBanned &&
             !user.isSuspended;
    }).map(user => ({
      ...user,
      matchPercentage: matchesMap.get(user._id)?.percentage || 0,
      matchDetails: matchesMap.get(user._id)?.commonInterests || {},
      // Simulate online status based on lastLogin (if available)
      online: user.lastLogin ? (new Date() - new Date(user.lastLogin) < 5 * 60 * 1000) : false
    }));
    
    // Sort by match percentage (highest first)
    allReaders.sort((a, b) => b.matchPercentage - a.matchPercentage);
    
    // Update stats
    updateStats();
    
    // Render readers
    renderReaders();
    
    console.log(`✅ Loaded ${allReaders.length} readers`);
    
  } catch (error) {
    console.error('Error loading readers:', error);
    document.getElementById('readersGrid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i class="fas fa-exclamation-triangle"></i>
        <p>Error loading readers. Please make sure the server is running.</p>
        <p style="font-size:0.85rem;margin-top:8px">${error.message}</p>
        <button onclick="location.reload()" class="btn-primary" style="margin-top:16px">
          <i class="fas fa-sync-alt"></i> Retry
        </button>
      </div>
    `;
  }
}

// Update statistics
function updateStats() {
  document.getElementById('totalReaders').textContent = allReaders.length;
  document.getElementById('onlineNow').textContent = allReaders.filter(r => r.online).length;
  
  const topMatch = allReaders.length > 0 ? allReaders[0].matchPercentage : 0;
  document.getElementById('topMatch').textContent = topMatch;
  
  const matchesCount = allReaders.filter(r => r.matchPercentage >= 50).length;
  document.getElementById('matchesCount').textContent = matchesCount;
}

// Render readers grid
function renderReaders() {
  const grid = document.getElementById('readersGrid');
  let filteredReaders = [...allReaders];
  
  // Apply search filter
  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    filteredReaders = filteredReaders.filter(reader => 
      reader.name.toLowerCase().includes(term) ||
      (reader.username && reader.username.toLowerCase().includes(term)) ||
      (reader.favoriteBooks && reader.favoriteBooks.some(book => book.toLowerCase().includes(term))) ||
      (reader.favoriteGenres && reader.favoriteGenres.some(genre => genre.toLowerCase().includes(term)))
    );
  }
  
  // Apply genre filter
  if (currentGenre !== 'all') {
    filteredReaders = filteredReaders.filter(reader => 
      reader.favoriteGenres && reader.favoriteGenres.includes(currentGenre)
    );
  }
  
  // Apply sort/filter
  if (currentFilter === 'match') {
    filteredReaders.sort((a, b) => b.matchPercentage - a.matchPercentage);
  } else if (currentFilter === 'online') {
    filteredReaders = filteredReaders.filter(r => r.online);
  } else if (currentFilter === 'recent') {
    filteredReaders.sort((a, b) => new Date(b.lastLogin || 0) - new Date(a.lastLogin || 0));
  }
  
  // Update result count
  document.getElementById('resultCount').textContent = `Found ${filteredReaders.length} readers`;
  
  if (filteredReaders.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <i class="fas fa-book-open"></i>
        <p>No readers found matching your criteria.</p>
        <button onclick="resetFilters()" class="btn-primary" style="margin-top:16px">
          <i class="fas fa-undo"></i> Reset Filters
        </button>
      </div>
    `;
    return;
  }
  
  grid.innerHTML = filteredReaders.map(reader => {
    const hasProfilePic = reader.profilePicture && 
                          reader.profilePicture !== 'null' && 
                          reader.profilePicture !== 'undefined';
    
    return `
      <div class="card" data-user-id="${reader._id}">
        <div class="avatar-wrap">
          ${hasProfilePic ? 
            `<img src="${reader.profilePicture}" alt="${reader.name}" class="avatar" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(reader.name)}&background=E0B973&color=3B1D14&size=80'">` :
            `<div class="avatar-placeholder">${reader.name.charAt(0).toUpperCase()}</div>`
          }
          ${reader.online ? '<span class="online-dot"></span>' : ''}
        </div>
        <h3>${escapeHtml(reader.name)}</h3>
        ${reader.username ? `<p style="color:#d4b5a0;font-size:0.8rem;margin-bottom:8px">@${escapeHtml(reader.username)}</p>` : ''}
        <div class="tags">
          ${(reader.favoriteGenres || []).slice(0, 3).map(genre => `<span class="tag">${escapeHtml(genre)}</span>`).join('')}
          ${(!reader.favoriteGenres || reader.favoriteGenres.length === 0) ? '<span class="tag">Book Lover</span>' : ''}
        </div>
        ${reader.matchPercentage > 0 ? `
          <div class="match-percentage">
            ${reader.matchPercentage}% Match
          </div>
        ` : ''}
        <div class="card-btns">
          <button class="btn-secondary" onclick="viewProfile('${reader._id}')">
            <i class="fas fa-user"></i> Profile
          </button>
          <button class="btn-primary" onclick="openMessageModal('${reader._id}', '${escapeHtml(reader.name)}')">
            <i class="fas fa-comment"></i> Message
          </button>
        </div>
      </div>
    `;
  }).join('');
}

// Setup event listeners
function setupEventListeners() {
  // Search input
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      searchTerm = e.target.value;
      renderReaders();
    });
  }
  
  // Filter buttons
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderReaders();
    });
  });
  
  // Genre pills
  document.querySelectorAll('[data-genre]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-genre]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentGenre = btn.dataset.genre;
      renderReaders();
    });
  });
}

// Reset all filters
function resetFilters() {
  searchTerm = '';
  currentFilter = 'all';
  currentGenre = 'all';
  
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('[data-filter]').forEach(btn => {
    btn.classList.remove('active');
    if (btn.dataset.filter === 'all') btn.classList.add('active');
  });
  document.querySelectorAll('[data-genre]').forEach(btn => {
    btn.classList.remove('active');
    if (btn.dataset.genre === 'all') btn.classList.add('active');
  });
  
  renderReaders();
}

// View profile
function viewProfile(userId) {
  window.location.href = `../Profile/view-profile.html?id=${userId}`;
}

// Open message modal
function openMessageModal(userId, userName) {
  currentRecipientId = userId;
  currentRecipientName = userName;
  document.getElementById('messageText').value = '';
  document.getElementById('modalTitle').textContent = `Message ${userName}`;
  const modal = document.getElementById('messageModal');
  modal.style.display = 'flex';
}

// Close modal
function closeModal() {
  document.getElementById('messageModal').style.display = 'none';
  currentRecipientId = null;
  currentRecipientName = '';
}

// Send message
async function sendMessage() {
  const messageText = document.getElementById('messageText').value.trim();
  
  if (!messageText) {
    alert('Please enter a message');
    return;
  }
  
  if (!currentRecipientId) {
    alert('No recipient selected');
    return;
  }
  
  try {
    const token = localStorage.getItem('litlink_token');
    
    // First, check if conversation exists or create one
    const conversationResponse = await fetch('http://localhost:5002/api/chat/conversations', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ participantId: currentRecipientId })
    });
    
    if (!conversationResponse.ok) {
      throw new Error('Failed to create conversation');
    }
    
    const conversationData = await conversationResponse.json();
    const conversationId = conversationData.conversation?._id || conversationData._id;
    
    if (!conversationId) {
      throw new Error('No conversation ID returned');
    }
    
    // Send message
    const messageResponse = await fetch(`http://localhost:5002/api/chat/conversations/${conversationId}/messages`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ content: messageText })
    });
    
    if (messageResponse.ok) {
      alert(`✅ Message sent to ${currentRecipientName}!`);
      closeModal();
      
      // Ask if user wants to go to chat
      const goToChat = confirm('Message sent! Would you like to continue the conversation in chat?');
      if (goToChat) {
        window.location.href = `../Chat/chat.html?userId=${currentRecipientId}`;
      }
    } else {
      const errorData = await messageResponse.json();
      throw new Error(errorData.message || 'Failed to send message');
    }
    
  } catch (error) {
    console.error('Error sending message:', error);
    alert(`Failed to send message: ${error.message}\n\nPlease try again later.`);
  }
}

// Helper function to escape HTML
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Handle modal click outside
window.onclick = function(event) {
  const modal = document.getElementById('messageModal');
  if (event.target === modal) {
    closeModal();
  }
}

// Handle keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('messageModal').style.display === 'flex') {
    closeModal();
  }
});
</script>
</body>
</html>
