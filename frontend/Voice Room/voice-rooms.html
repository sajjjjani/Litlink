<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  
    <script src="../config.js"></script>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Litlink — Voice Rooms</title>
  <link rel="stylesheet" href="voice.css"/>
</head>
<body>

<!-- TOP NAV -->
<nav class="top-nav">
  <div class="nav-left">
    <a href="../Dashboard/dashboard.html" class="nav-logo" style="text-decoration: none; color: inherit;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span class="nav-logo-text">Litlink</span>
    </a>
    <span class="nav-section-title">Voice Rooms</span>
  </div>
  <div class="nav-right">
    <button class="nav-dashboard" aria-label="Dashboard">
      Dashboard
    </button>
    <button class="nav-explore">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      Explore Community
    </button>
    <button class="nav-avatar" aria-label="Profile">JD</button>
  </div>
</nav>

<!-- APP -->
<div id="lobby-app">

  <!-- SIDEBAR -->
  <aside id="lobby-sidebar">
    <div class="sidebar-trending">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      Fantasy genre most active this week
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-hdr">
        <span class="sidebar-section-title">Live Rooms</span>
        <span class="live-badge" id="live-count-badge">0 live</span>
      </div>
      <div class="rooms-list" id="rooms-list"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-hdr">
        <span class="sidebar-section-title">Upcoming Scheduled</span>
      </div>
      <div class="upcoming-list" id="upcoming-list"></div>
    </div>

    <div class="sidebar-section">
      <button class="sidebar-create-btn" id="sidebar-create-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Start a Room
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="lobby-main">
    <div id="empty-state">
      <div class="es-inner">
        <div class="es-icons">
          <div class="es-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </div>
          <div class="es-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </div>
        </div>
        <h2 class="es-title">Join a live room to discuss books in real time</h2>
        <p class="es-desc">Select a room from the sidebar or start your own conversation with fellow book lovers</p>
        <button class="es-cta" id="empty-create-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Start a Room
        </button>
      </div>
    </div>
  </main>
</div>

<!-- CREATE ROOM MODAL -->
<div class="modal-backdrop hidden" id="modal-backdrop"></div>
<div class="modal-box hidden" id="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-hdr">
    <h2 class="modal-title" id="modal-title">Start a Room</h2>
    <button class="modal-close" id="modal-close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="modal-body">
    <div class="form-group">
      <label for="m-title">Room Title</label>
      <input type="text" id="m-title" class="form-input" placeholder="e.g., Fantasy World Debate"/>
    </div>
    <div class="form-group">
      <label for="m-genre">Book / Genre</label>
      <select id="m-genre" class="form-select">
        <option value="">Select a genre</option>
        <!-- Fiction -->
        <optgroup label="Fiction">
          <option>Fantasy</option>
          <option>High Fantasy</option>
          <option>Dark Fantasy</option>
          <option>Urban Fantasy</option>
          <option>Science Fiction</option>
          <option>Dystopian</option>
          <option>Cyberpunk</option>
          <option>Space Opera</option>
          <option>Mystery</option>
          <option>Thriller</option>
          <option>Psychological Thriller</option>
          <option>Crime Fiction</option>
          <option>Cozy Mystery</option>
          <option>Horror</option>
          <option>Gothic Fiction</option>
          <option>Supernatural Fiction</option>
          <option>Romance</option>
          <option>Historical Romance</option>
          <option>Contemporary Romance</option>
          <option>Paranormal Romance</option>
          <option>Literary Fiction</option>
          <option>Magical Realism</option>
          <option>Historical Fiction</option>
          <option>Adventure</option>
          <option>Action & Adventure</option>
          <option>Humor & Satire</option>
          <option>Short Stories</option>
          <option>Anthologies</option>
        </optgroup>
        <!-- Classic Literature -->
        <optgroup label="Classic Literature">
          <option>Classic Literature</option>
          <option>Ancient Literature</option>
          <option>Victorian Literature</option>
          <option>Modernist Literature</option>
          <option>World Literature</option>
          <option>Mythology &amp; Folklore</option>
        </optgroup>
        <!-- Poetry & Drama -->
        <optgroup label="Poetry & Drama">
          <option>Poetry</option>
          <option>Spoken Word</option>
          <option>Drama &amp; Plays</option>
          <option>Screenwriting</option>
        </optgroup>
        <!-- Non-Fiction -->
        <optgroup label="Non-Fiction">
          <option>Non-Fiction</option>
          <option>Memoir &amp; Autobiography</option>
          <option>Biography</option>
          <option>True Crime</option>
          <option>History</option>
          <option>Philosophy</option>
          <option>Psychology</option>
          <option>Self-Help &amp; Personal Growth</option>
          <option>Business &amp; Leadership</option>
          <option>Economics</option>
          <option>Science &amp; Nature</option>
          <option>Technology</option>
          <option>Politics &amp; Society</option>
          <option>Travel Writing</option>
          <option>Food &amp; Cooking</option>
          <option>Art &amp; Design</option>
          <option>Music &amp; Culture</option>
          <option>Sports &amp; Recreation</option>
          <option>Spirituality &amp; Religion</option>
          <option>Health &amp; Wellness</option>
          <option>Environment &amp; Nature</option>
          <option>Education</option>
          <option>Journalism &amp; Essays</option>
        </optgroup>
        <!-- Young Adult & Children -->
        <optgroup label="Young Adult & Children">
          <option>Young Adult (YA)</option>
          <option>YA Fantasy</option>
          <option>YA Romance</option>
          <option>YA Thriller</option>
          <option>Middle Grade</option>
          <option>Children's Books</option>
          <option>Picture Books</option>
        </optgroup>
        <!-- Manga & Comics -->
        <optgroup label="Manga & Comics">
          <option>Manga</option>
          <option>Graphic Novels</option>
          <option>Comics</option>
          <option>Webtoons</option>
        </optgroup>
        <!-- Other -->
        <optgroup label="Other">
          <option>Book Club Picks</option>
          <option>Award Winners</option>
          <option>Debut Authors</option>
          <option>Indie &amp; Self-Published</option>
          <option>Translated Literature</option>
          <option>LGBTQ+ Literature</option>
          <option>South Asian Literature</option>
          <option>African Literature</option>
          <option>Latin American Literature</option>
          <option>East Asian Literature</option>
          <option>General Discussion</option>
        </optgroup>
      </select>
    </div>
    <div class="form-group">
      <label for="m-desc">Description (optional)</label>
      <textarea id="m-desc" class="form-textarea" rows="3" placeholder="What will you discuss?"></textarea>
    </div>
    <div class="form-group">
      <label>When</label>
      <div class="sched-toggle">
        <!-- FIX: Button says "Start Now" - clicking it IMMEDIATELY starts the room -->
        <button class="sched-btn active" id="sched-now">Start Now</button>
        <button class="sched-btn" id="sched-later">Schedule Later</button>
      </div>
    </div>
    <div class="sched-fields hidden" id="sched-fields">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="m-date" class="form-input"/>
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="time" id="m-time" class="form-input"/>
      </div>
    </div>
  </div>
  <div class="modal-ftr">
    <button class="modal-cancel" id="modal-cancel">Cancel</button>
    <!-- FIX: text updates based on mode. "Start Room" for now, "Schedule Room" for later -->
    <button class="modal-submit" id="modal-submit" disabled>Start Room</button>
  </div>
</div>

<script src="voice-lobby.js"></script>
    <script src="../utils/textSize.js"></script>
</body>
</html>
